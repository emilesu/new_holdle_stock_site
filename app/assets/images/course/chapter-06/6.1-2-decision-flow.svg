<svg xmlns="http://www.w3.org/2000/svg" width="700" height="550" viewBox="0 0 700 550">
  <defs>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#999"/>
    </marker>
  </defs>
  <rect width="700" height="550" rx="8" fill="#FAFAFA" filter="url(#sh2)"/>

  <text x="350" y="32" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#2C3E50" text-anchor="middle">HOLDLE全流程决策路线图</text>

  <!-- 第1步：选股 区域 -->
  <rect x="30" y="55" width="640" height="40" rx="6" fill="#E8F8F5"/>
  <text x="50" y="80" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#27AE60">选股阶段</text>

  <!-- 选股节点 -->
  <rect x="50" y="105" width="130" height="42" rx="6" fill="#27AE60"/>
  <text x="115" y="132" font-family="PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">金字塔初筛</text>
  <line x1="180" y1="126" x2="210" y2="126" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="105" width="130" height="42" rx="6" fill="#27AE60"/>
  <text x="280" y="132" font-family="PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">雷达图对比</text>
  <line x1="345" y1="126" x2="375" y2="126" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="380" y="105" width="130" height="42" rx="6" fill="#27AE60"/>
  <text x="445" y="132" font-family="PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">加入观察池</text>

  <!-- 说明文字 -->
  <text x="115" y="165" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">选行业→看排名</text>
  <text x="280" y="165" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">ROE+现金优先</text>
  <text x="445" y="165" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">5-8只候选</text>

  <!-- 跨阶段箭头：选股→择时 -->
  <line x1="445" y1="147" x2="445" y2="195" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="178" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="end">等待状态A</text>

  <!-- 第2步：择时 区域 -->
  <rect x="30" y="200" width="640" height="40" rx="6" fill="#EBF5FB"/>
  <text x="50" y="225" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#3498DB">择时阶段</text>

  <!-- 择时节点 -->
  <rect x="50" y="250" width="110" height="42" rx="6" fill="#3498DB"/>
  <text x="105" y="267" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">等状态A</text>
  <text x="105" y="283" font-family="PingFang SC, sans-serif" font-size="9" fill="#DDD" text-anchor="middle">月K第一根红柱</text>
  <line x1="160" y1="271" x2="185" y2="271" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="190" y="250" width="110" height="42" rx="6" fill="#3498DB"/>
  <text x="245" y="267" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">切日K线</text>
  <text x="245" y="283" font-family="PingFang SC, sans-serif" font-size="9" fill="#DDD" text-anchor="middle">次月第一天切换</text>
  <line x1="300" y1="271" x2="325" y2="271" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="330" y="250" width="120" height="42" rx="6" fill="#3498DB"/>
  <text x="390" y="267" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">回撤确认</text>
  <text x="390" y="283" font-family="PingFang SC, sans-serif" font-size="9" fill="#DDD" text-anchor="middle">出现MACD绿柱</text>
  <line x1="450" y1="271" x2="475" y2="271" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="250" width="120" height="42" rx="6" fill="#E74C3C"/>
  <text x="540" y="271" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">突破买入</text>

  <!-- 说明文字 -->
  <text x="540" y="310" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">突破前高买入</text>

  <!-- 跨阶段箭头：择时→管理 -->
  <line x1="540" y1="292" x2="540" y2="340" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="322" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="end">进入管理</text>

  <!-- 第3步：管理 区域 -->
  <rect x="30" y="345" width="640" height="40" rx="6" fill="#FEF5E7"/>
  <text x="50" y="370" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#F39C12">管理阶段</text>

  <!-- 管理节点 -->
  <rect x="50" y="395" width="110" height="42" rx="6" fill="#F39C12"/>
  <text x="105" y="412" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">设止损</text>
  <text x="105" y="428" font-family="PingFang SC, sans-serif" font-size="9" fill="#FEF5E7" text-anchor="middle">入场价-20%</text>
  <line x1="160" y1="416" x2="185" y2="416" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="190" y="395" width="130" height="42" rx="6" fill="#F39C12"/>
  <text x="255" y="412" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#FFF" text-anchor="middle">周K低点管理</text>
  <text x="255" y="428" font-family="PingFang SC, sans-serif" font-size="9" fill="#FEF5E7" text-anchor="middle">出场价动态上移</text>
  <line x1="320" y1="416" x2="345" y2="416" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="395" width="110" height="42" rx="6" fill="#E74C3C"/>
  <text x="405" y="416" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">跌破卖出</text>

  <!-- 循环箭头（抬高，不压到底部摘要条） -->
  <path d="M405,437 Q405,460 540,460 Q580,460 580,437 L580,395" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="510" y="453" font-family="PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">不断形成新低点 → 持续持有</text>

  <!-- 底部摘要条 -->
  <rect x="30" y="485" width="640" height="45" rx="6" fill="#F0F0F0" opacity="0.5"/>
  <text x="350" y="513" font-family="PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#666" text-anchor="middle">选好股（第一层概率优势）→ 等好价（第二层概率优势）→ 管好仓（安全网）</text>
</svg>