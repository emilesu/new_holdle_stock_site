<svg xmlns="http://www.w3.org/2000/svg" width="500" height="340" viewBox="0 0 500 340">
  <defs>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="340" rx="12" fill="url(#bgGrad)" filter="url(#sh2)"/>

  <!-- HOLDLE 标志 -->
  <text x="250" y="80" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#FFF" text-anchor="middle" letter-spacing="6">HOLDLE</text>
  <text x="250" y="105" font-family="PingFang SC, sans-serif" font-size="12" fill="#7F8C8D" text-anchor="middle" letter-spacing="2">规则化交易 · 长期主义</text>

  <!-- 分隔线 -->
  <line x1="120" y1="125" x2="380" y2="125" stroke="#34495E" stroke-width="1"/>

  <!-- 核心口号 -->
  <text x="250" y="170" font-family="PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#FFF" text-anchor="middle">选好股，等好价，管好仓</text>

  <!-- 副口号 -->
  <text x="250" y="210" font-family="PingFang SC, sans-serif" font-size="26" font-weight="700" fill="#F39C12" text-anchor="middle">结硬寨，打呆仗</text>

  <!-- 底部说明 -->
  <text x="250" y="258" font-family="PingFang SC, sans-serif" font-size="11" fill="#7F8C8D" text-anchor="middle">不预测，只识别 · 不猜测，只执行</text>
  <text x="250" y="280" font-family="PingFang SC, sans-serif" font-size="11" fill="#7F8C8D" text-anchor="middle">市场不关门，机会永远在</text>
  <text x="250" y="302" font-family="PingFang SC, sans-serif" font-size="11" fill="#7F8C8D" text-anchor="middle">管住手，拿住好票，让时间给你答案</text>

  <!-- 装饰点 -->
  <circle cx="250" cy="325" r="2" fill="#F39C12" opacity="0.5"/>
</svg>