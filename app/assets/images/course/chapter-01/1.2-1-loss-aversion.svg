<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <!-- 背景 -->
  <rect width="600" height="400" fill="#FAFAFA" rx="8"/>
  
  <!-- 标题 -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">亏钱比赚钱更难受</text>
  
  <!-- 坐标轴 -->
  <line x1="60" y1="340" x2="560" y2="340" stroke="#666" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="60" y2="50" stroke="#666" stroke-width="1.5"/>
  
  <!-- Y轴标签 -->
  <text x="55" y="55" text-anchor="end" font-size="11" fill="#666">强</text>
  <text x="55" y="340" text-anchor="end" font-size="11" fill="#666">弱</text>
  <text x="25" y="200" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90,25,200)">情绪强度</text>
  
  <!-- X轴标签 -->
  <text x="120" y="365" text-anchor="middle" font-size="11" fill="#666">亏50%</text>
  <text x="310" y="365" text-anchor="middle" font-size="11" fill="#666">盈亏平衡点</text>
  <text x="500" y="365" text-anchor="middle" font-size="11" fill="#666">赚50%</text>
  
  <!-- 零点虚线 -->
  <line x1="310" y1="340" x2="310" y2="55" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- 亏损曲线（痛苦） - 左半部分，更陡 -->
  <path d="M 310 340 Q 260 140 210 70 Q 180 40 150 40 Q 110 40 80 50"
        fill="none" stroke="#E74C3C" stroke-width="2.5"/>
  
  <!-- 盈利曲线（快乐） - 右半部分，更平缓 -->
  <path d="M 310 340 Q 360 280 410 230 Q 450 200 490 180 Q 530 170 550 168"
        fill="none" stroke="#27AE60" stroke-width="2.5"/>
  
  <!-- 标注：亏损区域 -->
  <text x="170" y="80" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="bold">亏钱：痛感来得又急又猛</text>
  
  <!-- 标注：盈利区域 -->
  <text x="440" y="175" text-anchor="middle" font-size="12" fill="#27AE60" font-weight="bold">赚钱：开心但后劲不足</text>
  
  <!-- 标注箭头 -->
  <!-- 亏损箭头 -->
  <line x1="170" y1="85" x2="170" y2="105" stroke="#E74C3C" stroke-width="1"/>
  <polygon points="170,110 166,102 174,102" fill="#E74C3C"/>
  
  <!-- 盈利箭头 -->
  <line x1="440" y1="180" x2="440" y2="195" stroke="#27AE60" stroke-width="1"/>
  <polygon points="440,200 436,192 444,192" fill="#27AE60"/>
  
  <!-- 说明文字 -->
  <text x="300" y="390" text-anchor="middle" font-size="11" fill="#999">× 亏损的痛苦 ≈ 赚钱快乐的两倍</text>
</svg>