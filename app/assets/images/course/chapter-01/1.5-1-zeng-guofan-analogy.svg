<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="600" height="360" fill="#FAFAFA" rx="8"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">"结硬寨、打呆仗"——曾国藩打仗 vs HOLDLE交易</text>
  
  <!-- 左侧：曾国藩 -->
  <rect x="40" y="60" width="240" height="260" fill="#8E44AD" opacity="0.06" rx="8"/>
  <text x="160" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#8E44AD">⚔ 曾国藩打仗</text>
  
  <text x="60" y="120" font-size="11" fill="#555">结硬寨：</text>
  <text x="60" y="140" font-size="11" fill="#777">每到一个地方先挖壕沟、</text>
  <text x="60" y="158" font-size="11" fill="#777">筑高墙，不急着交战</text>
  
  <text x="60" y="188" font-size="11" fill="#555">打呆仗：</text>
  <text x="60" y="208" font-size="11" fill="#777">不打巧仗、不搞奇袭，</text>
  <text x="60" y="226" font-size="11" fill="#777">用笨办法稳扎稳打</text>
  
  <text x="60" y="256" font-size="11" fill="#555">结果：</text>
  <text x="60" y="276" font-size="11" fill="#777">以弱胜强，最终平定</text>
  <text x="60" y="294" font-size="11" fill="#777">太平天国</text>
  
  <!-- 箭头 -->
  <text x="310" y="190" text-anchor="middle" font-size="20" fill="#999">→</text>
  
  <!-- 右侧：HOLDLE -->
  <rect x="320" y="60" width="240" height="260" fill="#27AE60" opacity="0.06" rx="8"/>
  <text x="440" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#27AE60">📊 HOLDLE交易</text>
  
  <text x="340" y="120" font-size="11" fill="#555">选好股：</text>
  <text x="340" y="140" font-size="11" fill="#777">金字塔+雷达图筛选，</text>
  <text x="340" y="158" font-size="11" fill="#777">不靠消息靠数据</text>
  
  <text x="340" y="188" font-size="11" fill="#555">等好价：</text>
  <text x="340" y="208" font-size="11" fill="#777">等状态A出现才出手，</text>
  <text x="340" y="226" font-size="11" fill="#777">不预测不追高</text>
  
  <text x="340" y="256" font-size="11" fill="#555">管好仓：</text>
  <text x="340" y="276" font-size="11" fill="#777">分散、止损、周K低点，</text>
  <text x="340" y="294" font-size="11" fill="#777">不凭感觉管理</text>
</svg>