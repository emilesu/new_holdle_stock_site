<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="600" height="420" fill="#FAFAFA" rx="8"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">HOLDLE站在哪？价值派和技术派之间</text>

  <!-- 四个象限 -->
  <!-- 左上：价值派 -->
  <rect x="50" y="60" width="230" height="140" fill="#3498DB" opacity="0.08" rx="8"/>
  <text x="165" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498DB">价值派</text>
  <text x="165" y="115" text-anchor="middle" font-size="11" fill="#555">选股能力强（看财报）</text>
  <text x="165" y="135" text-anchor="middle" font-size="11" fill="#555">择时能力弱（死扛）</text>
  <text x="165" y="160" text-anchor="middle" font-size="11" fill="#999">短板：买好公司但不管价格</text>

  <!-- 右上：HOLDLE -->
  <rect x="310" y="60" width="240" height="140" fill="#27AE60" opacity="0.12" rx="8"/>
  <rect x="310" y="60" width="240" height="140" fill="none" stroke="#27AE60" stroke-width="2" stroke-dasharray="6,3" rx="8"/>
  <text x="430" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#27AE60">HOLDLE ✅</text>
  <text x="430" y="115" text-anchor="middle" font-size="11" fill="#555">选股强（金字塔+雷达图）</text>
  <text x="430" y="135" text-anchor="middle" font-size="11" fill="#555">择时强（状态A识别）</text>
  <text x="430" y="160" text-anchor="middle" font-size="11" fill="#999">管理强（规则化）</text>

  <!-- 左下：大多数大多数普通投资者 -->
  <rect x="50" y="220" width="230" height="140" fill="#E74C3C" opacity="0.08" rx="8"/>
  <text x="165" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#E74C3C">大多数普通投资者</text>
  <text x="165" y="275" text-anchor="middle" font-size="11" fill="#555">选股弱（听消息）</text>
  <text x="165" y="295" text-anchor="middle" font-size="11" fill="#555">择时弱（追涨杀跌）</text>
  <text x="165" y="320" text-anchor="middle" font-size="11" fill="#999">短板：两头都不沾</text>

  <!-- 右下：技术派 -->
  <rect x="310" y="220" width="240" height="140" fill="#E67E22" opacity="0.08" rx="8"/>
  <text x="430" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#E67E22">技术派</text>
  <text x="430" y="275" text-anchor="middle" font-size="11" fill="#555">择时...好像也不太行</text>
   <text x="430" y="295" text-anchor="middle" font-size="11" fill="#555">K线分析、各种指标信号</text>
   <text x="430" y="320" text-anchor="middle" font-size="11" fill="#999">短板：选股几乎没有</text>

  <!-- 坐标轴 -->
  <line x1="295" y1="60" x2="295" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="50" y1="205" x2="550" y2="205" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="300" y="380" text-anchor="middle" font-size="11" fill="#999">选股能力 →</text>
  <text x="25" y="210" text-anchor="middle" font-size="11" fill="#999" transform="rotate(-90,25,210)">择时能力 →</text>
</svg>
