<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="600" height="380" fill="#FAFAFA" rx="8"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">HOLDLE两条腿走路——择时+管理</text>
  
  <!-- 上方：两条腿 -->
  <text x="300" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">一条腿走路不稳，两条腿才能走远</text>
  
  <!-- 左腿：择时 -->
  <rect x="80" y="95" width="200" height="110" fill="#3498DB" opacity="0.1" rx="8"/>
  <rect x="80" y="95" width="200" height="110" fill="none" stroke="#3498DB" stroke-width="1.5" rx="8"/>
  <text x="180" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498DB">左腿：择时</text>
  <text x="100" y="145" font-size="11" fill="#555">• 月K线看大趋势</text>
  <text x="100" y="165" font-size="11" fill="#555">• MACD识别状态A</text>
  <text x="100" y="185" font-size="11" fill="#555">• 日K线找入场点</text>
  
  <!-- 右腿：管理 -->
  <rect x="320" y="95" width="200" height="110" fill="#27AE60" opacity="0.1" rx="8"/>
  <rect x="320" y="95" width="200" height="110" fill="none" stroke="#27AE60" stroke-width="1.5" rx="8"/>
  <text x="420" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">右腿：管理</text>
  <text x="340" y="145" font-size="11" fill="#555">• 分散持仓</text>
  <text x="340" y="165" font-size="11" fill="#555">• 止损规则</text>
  <text x="340" y="185" font-size="11" fill="#555">• 周K低点出场</text>
  
  <!-- 下方基础 -->
  <rect x="60" y="250" width="480" height="50" fill="#666" opacity="0.08" rx="6"/>
  <text x="300" y="275" text-anchor="middle" font-size="12" fill="#555">底层基础：选好股（财务数据+金字塔雷达图）</text>
  
  <text x="300" y="310" text-anchor="middle" font-size="11" fill="#999">选好股是地基，择时和管理是两条腿，缺一不可</text>
  
  <!-- 连接线 -->
  <line x1="180" y1="205" x2="180" y2="250" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="420" y1="205" x2="420" y2="250" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- 人形图标 -->
  <circle cx="300" cy="85" r="8" fill="#333" opacity="0.3"/>
  <line x1="300" y1="93" x2="300" y2="115" stroke="#333" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="100" x2="320" y2="100" stroke="#333" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="115" x2="280" y2="140" stroke="#333" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="115" x2="320" y2="140" stroke="#333" stroke-width="2" opacity="0.3"/>
</svg>