<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="600" height="400" fill="#FAFAFA" rx="8"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">定投回测 2007-2015——长达8年的亏损区间</text>
  
  <!-- 坐标轴 -->
  <line x1="60" y1="340" x2="560" y2="340" stroke="#666" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="60" y2="50" stroke="#666" stroke-width="1.5"/>
  
  <!-- X轴 -->
  <text x="100" y="362" text-anchor="middle" font-size="10" fill="#999">2007</text>
  <text x="180" y="362" text-anchor="middle" font-size="10" fill="#999">2008</text>
  <text x="260" y="362" text-anchor="middle" font-size="10" fill="#999">2010</text>
  <text x="340" y="362" text-anchor="middle" font-size="10" fill="#999">2012</text>
  <text x="420" y="362" text-anchor="middle" font-size="10" fill="#999">2014</text>
  <text x="500" y="362" text-anchor="middle" font-size="10" fill="#999">2015</text>
  
  <!-- Y轴 -->
  <text x="55" y="85" text-anchor="end" font-size="10" fill="#666">+20%</text>
  <text x="55" y="170" text-anchor="end" font-size="10" fill="#666">+10%</text>
  <text x="55" y="255" text-anchor="end" font-size="10" fill="#666">0%</text>
  <text x="55" y="340" text-anchor="end" font-size="10" fill="#666">-10%</text>
  
  <!-- 零线 -->
  <line x1="60" y1="255" x2="560" y2="255" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- 定投曲线 - 长期在零线以下 -->
  <path d="M 90 255 L 120 240 L 150 260 L 180 280 L 210 310 L 240 325 L 270 330 L 300 335 L 330 330 L 360 320 L 390 300 L 420 260 L 450 220 L 480 190 L 510 170 L 540 155"
        fill="none" stroke="#E74C3C" stroke-width="2.5"/>
  
  <!-- 标注亏损区间 -->
  <rect x="140" y="245" width="310" height="100" fill="#E74C3C" opacity="0.08" rx="3"/>
  <text x="295" y="250" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="bold">亏损区间（约8年）</text>
  
  <text x="500" y="150" text-anchor="middle" font-size="11" fill="#27AE60">终于转正</text>
  
  <text x="300" y="390" text-anchor="middle" font-size="11" fill="#999">真实回测：2007年高点入市定投，直到2015年才回本</text>
</svg>