<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="600" height="350" fill="#FAFAFA" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">资产负债表就是"你有什么，钱哪来的"</text>

  <!-- 天平/等式示意图：左边=右边 -->
  <!-- 左边：房子（资产） -->
  <rect x="60" y="65" width="200" height="220" fill="#3498DB" opacity="0.08" rx="10"/>
  <rect x="60" y="65" width="200" height="220" fill="none" stroke="#3498DB" stroke-width="2" rx="10"/>
  
  <!-- 小房子图标 -->
  <polygon points="160,100 110,145 210,145" fill="#3498DB" opacity="0.3"/>
  <rect x="130" y="145" width="60" height="55" fill="#3498DB" opacity="0.2" rx="2"/>
  <rect x="150" y="160" width="25" height="40" fill="#3498DB" opacity="0.4" rx="2"/>
  
  <text x="160" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498DB">房子（资产）</text>
  <text x="160" y="248" text-anchor="middle" font-size="11" fill="#666">总资产 = 房子的市价</text>
  <text x="160" y="268" text-anchor="middle" font-size="11" fill="#666">比如500万</text>

  <!-- 等号 -->
  <text x="295" y="180" text-anchor="middle" font-size="28" font-weight="bold" fill="#555">=</text>

  <!-- 右边：负债 + 权益 -->
  <!-- 负债部分 -->
  <rect x="340" y="65" width="200" height="100" fill="#E74C3C" opacity="0.08" rx="10"/>
  <rect x="340" y="65" width="200" height="100" fill="none" stroke="#E74C3C" stroke-width="2" rx="10"/>
  <text x="440" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#E74C3C">负债</text>
  <text x="440" y="118" text-anchor="middle" font-size="11" fill="#666">银行贷款 400万</text>
  <text x="440" y="140" text-anchor="middle" font-size="11" fill="#666">借来的钱</text>

  <!-- 权益部分 -->
  <rect x="340" y="185" width="200" height="100" fill="#27AE60" opacity="0.08" rx="10"/>
  <rect x="340" y="185" width="200" height="100" fill="none" stroke="#27AE60" stroke-width="2" rx="10"/>
  <text x="440" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">股东权益</text>
  <text x="440" y="238" text-anchor="middle" font-size="11" fill="#666">自己攒的首付 100万</text>
  <text x="440" y="260" text-anchor="middle" font-size="11" fill="#666">自己的钱</text>

  <!-- 加号 -->
  <text x="440" y="178" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">+</text>

  <!-- 底部公式 -->
  <rect x="100" y="305" width="400" height="32" fill="#333" opacity="0.08" rx="6"/>
  <text x="300" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">公式：资产（500万） = 负债（400万） + 股东权益（100万）</text>
</svg>