<svg xmlns="http://www.w3.org/2000/svg" width="500" height="560" viewBox="0 0 500 560">
  <defs>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="500" height="560" rx="8" fill="#FAFAFA" filter="url(#sh2)"/>

  <!-- 标题 -->
  <text x="250" y="32" font-family="PingFang SC, sans-serif" font-size="15" font-weight="700" fill="#2C3E50" text-anchor="middle">第2步：雷达图对比，ROE和现金优先看</text>

  <!-- 起始：行业候选公司 -->
  <ellipse cx="250" cy="85" rx="90" ry="22" fill="#EBF5FB" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="90" font-family="PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="middle">行业候选公司</text>

  <!-- 箭头1 -->
  <line x1="250" y1="107" x2="250" y2="132" stroke="#999" stroke-width="1.5"/>
  <polygon points="243,130 250,142 257,130" fill="#999"/>

  <!-- 第1层：ROE筛选 -->
  <rect x="145" y="150" width="210" height="48" rx="8" fill="#FCECEB" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="250" y="170" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#C0392B" text-anchor="middle">ROE &lt; 10% → 直接淘汰</text>
  <text x="250" y="188" font-family="PingFang SC, sans-serif" font-size="11" fill="#888" text-anchor="middle">ROE达标？进入下一轮</text>

  <!-- 箭头2 -->
  <line x1="250" y1="198" x2="250" y2="223" stroke="#999" stroke-width="1.5"/>
  <polygon points="243,221 250,233 257,221" fill="#999"/>

  <!-- 第2层：现金占比 -->
  <rect x="145" y="240" width="210" height="48" rx="8" fill="#FEF5E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="250" y="260" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#D35400" text-anchor="middle">现金占比 &lt; 10% → 风险偏高</text>
  <text x="250" y="278" font-family="PingFang SC, sans-serif" font-size="11" fill="#888" text-anchor="middle">现金充裕？进入下一轮</text>

  <!-- 箭头3 -->
  <line x1="250" y1="288" x2="250" y2="313" stroke="#999" stroke-width="1.5"/>
  <polygon points="243,311 250,323 257,311" fill="#999"/>

  <!-- 第3层：毛利率/净利率稳定 -->
  <rect x="135" y="330" width="230" height="48" rx="8" fill="#EBF5FB" stroke="#3498DB" stroke-width="1.5"/>
  <text x="250" y="350" font-family="PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#2C3E50" text-anchor="middle">毛利率和净利率是否稳定？</text>
  <text x="250" y="368" font-family="PingFang SC, sans-serif" font-size="11" fill="#888" text-anchor="middle">稳定且高于行业均值？进入下一轮</text>

  <!-- 箭头4 -->
  <line x1="250" y1="378" x2="250" y2="403" stroke="#999" stroke-width="1.5"/>
  <polygon points="243,401 250,413 257,401" fill="#999"/>

  <!-- 底部：初步通过 -->
  <ellipse cx="250" cy="445" rx="80" ry="22" fill="#27AE60" stroke="none"/>
  <text x="250" y="450" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">初步通过</text>

  <!-- 底部说明 -->
  <text x="250" y="498" font-family="PingFang SC, sans-serif" font-size="11" fill="#999" text-anchor="middle">选股5步法 · 第2步：用雷达图逐层筛选</text>
  <text x="250" y="518" font-family="PingFang SC, sans-serif" font-size="10" fill="#CCC" text-anchor="middle">先看ROE → 再看现金占比 → 最后看毛利率/净利率稳定性</text>

  <!-- 淘汰分支标注 -->
  <text x="380" y="177" font-family="PingFang SC, sans-serif" font-size="10" fill="#E74C3C">✗ 淘汰</text>
  <text x="380" y="267" font-family="PingFang SC, sans-serif" font-size="10" fill="#E67E22">⚠ 谨慎</text>
</svg>