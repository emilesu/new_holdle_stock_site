  <text x="310" y="170" text-anchor="middle" font-size="24" fill="#3498DB" font-weight="bold">→</text>
  <text x="310" y="190" text-anchor="middle" font-size="11" fill="#3498DB">金字塔筛选</text>

  <!-- 右侧：筛选后 -->
  <rect x="330" y="55" width="230" height="220" fill="#27AE60" opacity="0.05" rx="10"/>
  <text x="445" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">有了金字塔</text>

  <!-- 一个小圈子 -->
  <ellipse cx="445" cy="160" rx="60" ry="55" fill="#27AE60" opacity="0.1"/>
  <ellipse cx="445" cy="160" rx="60" ry="55" fill="none" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <circle cx="420" cy="145" r="6" fill="#27AE60" opacity="0.5"/>
