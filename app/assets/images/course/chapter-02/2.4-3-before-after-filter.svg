  <circle cx="470" cy="155" r="6" fill="#27AE60" opacity="0.5"/>
  <circle cx="435" cy="170" r="6" fill="#27AE60" opacity="0.5"/>
  <circle cx="460" cy="175" r="6" fill="#27AE60" opacity="0.5"/>

  <text x="445" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">观察池 5-8只</text>
  <text x="445" y="258" text-anchor="middle" font-size="10" fill="#666">半小时搞定</text>

  <!-- 底部说明 -->
  <text x="300" y="310" text-anchor="middle" font-size="11" fill="#999">不是替你选股，是帮你快速缩小范围</text>
