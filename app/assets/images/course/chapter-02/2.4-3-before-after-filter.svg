  <circle cx="85" cy="155" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="110" cy="150" r="4" fill="#E74C3C" opacity="0.3"/>
  <circle cx="140" cy="165" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="170" cy="160" r="4" fill="#E74C3C" opacity="0.3"/>
  <circle cx="210" cy="155" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="100" cy="185" r="4" fill="#E74C3C" opacity="0.3"/>
  <circle cx="130" cy="180" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="160" cy="190" r="4" fill="#E74C3C" opacity="0.3"/>
  <circle cx="190" cy="182" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="120" cy="210" r="4" fill="#E74C3C" opacity="0.3"/>
  <circle cx="150" cy="220" r="5" fill="#E74C3C" opacity="0.3"/>
  <circle cx="180" cy="215" r="4" fill="#E74C3C" opacity="0.3"/>
