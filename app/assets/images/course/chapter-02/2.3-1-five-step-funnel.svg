<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="500" height="450" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>

  <text x="250" y="30" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#2C3E50" text-anchor="middle">选股5步，越筛越精</text>

  <!-- 步骤序号（左侧） -->
  <g font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">
    <circle cx="40" cy="90" r="12" fill="#3498DB"/>
    <text x="40" y="95">1</text>
    <circle cx="40" cy="160" r="12" fill="#1ABC9C"/>
    <text x="40" y="165">2</text>
    <circle cx="40" cy="230" r="12" fill="#27AE60"/>
    <text x="40" y="235">3</text>
    <circle cx="40" cy="300" r="12" fill="#E67E22"/>
    <text x="40" y="305">4</text>
    <circle cx="40" cy="370" r="12" fill="#E74C3C"/>
    <text x="40" y="375">5</text>
  </g>

  <!-- 箭头连接线 -->
  <g stroke="#BDC3C7" stroke-width="2">
    <line x1="250" y1="118" x2="250" y2="132"/>
    <polygon points="250,135 245,128 255,128" fill="#BDC3C7"/>
    <line x1="250" y1="188" x2="250" y2="202"/>
    <polygon points="250,205 245,198 255,198" fill="#BDC3C7"/>
    <line x1="250" y1="258" x2="250" y2="272"/>
    <polygon points="250,275 245,268 255,268" fill="#BDC3C7"/>
    <line x1="250" y1="328" x2="250" y2="342"/>
    <polygon points="250,345 245,338 255,338" fill="#BDC3C7"/>
  </g>

  <!-- 第1层 -->
  <rect x="60" y="62" width="380" height="55" rx="6" fill="#3498DB" opacity="0.85"/>
  <text x="250" y="83" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">金字塔初筛</text>
  <text x="250" y="104" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">行业排名前10%</text>

  <!-- 第2层 -->
  <rect x="100" y="137" width="300" height="55" rx="6" fill="#1ABC9C" opacity="0.85"/>
  <text x="250" y="158" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">雷达图对比</text>
  <text x="250" y="179" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">ROE + 现金占比优先</text>

  <!-- 第3层 -->
  <rect x="135" y="207" width="230" height="55" rx="6" fill="#27AE60" opacity="0.85"/>
  <text x="250" y="228" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">五年趋势检查</text>
  <text x="250" y="249" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">稳定或上扬</text>

  <!-- 第4层 -->
  <rect x="170" y="277" width="160" height="55" rx="6" fill="#E67E22" opacity="0.85"/>
  <text x="250" y="298" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">人工复核</text>
  <text x="250" y="319" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">行业前景判断</text>

  <!-- 第5层 -->
  <rect x="200" y="347" width="100" height="55" rx="6" fill="#E74C3C" opacity="0.85"/>
  <text x="250" y="368" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">加入观察池</text>
  <text x="250" y="389" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.85">等待状态A</text>
</svg>