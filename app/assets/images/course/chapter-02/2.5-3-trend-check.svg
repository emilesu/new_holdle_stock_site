<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="500" height="420">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="500" height="420" fill="#FAFAFA" rx="8"/>
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">第3步：五年趋势检查，稳定才是硬道理</text>

  <!-- 上方 -->
  <ellipse cx="250" cy="85" rx="100" ry="30" fill="#3498DB" opacity="0.1"/>
  <ellipse cx="250" cy="85" rx="100" ry="30" fill="none" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="250" y="83" text-anchor="middle" font-size="12" fill="#3498DB">雷达图通过的公司</text>

  <polygon points="250,118 240,110 260,110" fill="#999"/>
  <text x="250" y="133" text-anchor="middle" font-size="10" fill="#999">翻开五年数据看趋势</text>
  <polygon points="250,148 240,140 260,140" fill="#999"/>

  <!-- 趋势对比：左边好，右边坏 -->
  <!-- 好的趋势 -->
  <rect x="50" y="165" width="180" height="130" fill="#27AE60" opacity="0.06" rx="8"/>
  <rect x="50" y="165" width="180" height="130" fill="none" stroke="#27AE60" stroke-width="1.5" rx="8"/>
  <text x="140" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#27AE60">✅ 趋势稳定</text>
  <path d="M 65 270 L 85 260 L 105 250 L 125 255 L 145 240 L 165 235 L 185 230 L 205 225"
        fill="none" stroke="#27AE60" stroke-width="2"/>
  <circle cx="65" cy="270" r="3" fill="#27AE60"/>
  <circle cx="105" cy="250" r="3" fill="#27AE60"/>
  <circle cx="145" cy="240" r="3" fill="#27AE60"/>
  <circle cx="205" cy="225" r="3" fill="#27AE60"/>
  <text x="140" y="305" text-anchor="middle" font-size="10" fill="#666">逐年平稳向上</text>

  <!-- 差的趋势 -->
  <rect x="270" y="165" width="180" height="130" fill="#E74C3C" opacity="0.06" rx="8"/>
  <rect x="270" y="165" width="180" height="130" fill="none" stroke="#E74C3C" stroke-width="1.5" rx="8"/>
  <text x="360" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#E74C3C">❌ 大起大落</text>
  <path d="M 285 220 L 305 270 L 325 210 L 345 280 L 365 230 L 385 260 L 405 220 L 425 270"
        fill="none" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="285" cy="220" r="3" fill="#E74C3C"/>
  <circle cx="325" cy="210" r="3" fill="#E74C3C"/>
  <circle cx="365" cy="230" r="3" fill="#E74C3C"/>
  <circle cx="425" cy="270" r="3" fill="#E74C3C"/>
  <text x="360" y="305" text-anchor="middle" font-size="10" fill="#666">忽高忽低不稳定</text>

  <!-- 箭头指向底部 -->
  <polygon points="250,318 240,310 260,310" fill="#999"/>
  <polygon points="250,333 240,325 260,325" fill="#999"/>

  <!-- 通过 -->
  <ellipse cx="250" cy="365" rx="80" ry="28" fill="#27AE60" opacity="0.15"/>
  <ellipse cx="250" cy="365" rx="80" ry="28" fill="none" stroke="#27AE60" stroke-width="2"/>
  <text x="250" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#27AE60">趋势通过</text>
  <text x="250" y="380" text-anchor="middle" font-size="10" fill="#666">进入人工复核</text>

  <text x="250" y="410" text-anchor="middle" font-size="10" fill="#999">五年数据才能看出是实力还是运气</text>
</svg>