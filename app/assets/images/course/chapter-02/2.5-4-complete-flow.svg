<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif; }
    </style>
  </defs>
  <rect width="500" height="520" fill="#FAFAFA" rx="8"/>
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">选股5步走完，从上万只到几只</text>

  <!-- 第1步 -->
  <rect x="60" y="55" width="380" height="48" fill="#3498DB" opacity="0.12" rx="6"/>
  <rect x="60" y="55" width="380" height="48" fill="none" stroke="#3498DB" stroke-width="1.5" rx="6"/>
  <circle cx="80" cy="79" r="12" fill="#3498DB"/>
  <text x="80" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1</text>
  <text x="105" y="75" font-size="12" font-weight="bold" fill="#3498DB">金字塔初筛</text>
  <text x="105" y="92" font-size="11" fill="#666">行业排名前10%</text>
  <text x="330" y="80" text-anchor="end" font-size="11" fill="#999">15000+ → 几十只</text>

  <polygon points="250,106 240,100 260,100" fill="#999"/>

  <!-- 第2步 -->
  <rect x="80" y="115" width="340" height="48" fill="#3498DB" opacity="0.1" rx="6"/>
  <rect x="80" y="115" width="340" height="48" fill="none" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="4,2" rx="6"/>
  <circle cx="100" cy="139" r="12" fill="#3498DB" opacity="0.7"/>
  <text x="100" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2</text>
  <text x="125" y="135" font-size="12" font-weight="bold" fill="#3498DB">雷达图对比</text>
  <text x="125" y="152" font-size="11" fill="#666">ROE+现金占比优先</text>
  <text x="330" y="140" text-anchor="end" font-size="11" fill="#999">几十只 → 十几只</text>

  <polygon points="250,166 240,160 260,160" fill="#999"/>

  <!-- 第3步 -->
  <rect x="100" y="175" width="300" height="48" fill="#27AE60" opacity="0.1" rx="6"/>
  <rect x="100" y="175" width="300" height="48" fill="none" stroke="#27AE60" stroke-width="1.5" rx="6"/>
  <circle cx="120" cy="199" r="12" fill="#27AE60"/>
  <text x="120" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3</text>
  <text x="145" y="195" font-size="12" font-weight="bold" fill="#27AE60">五年趋势检查</text>
  <text x="145" y="212" font-size="11" fill="#666">稳定或上扬的才留下</text>
  <text x="330" y="200" text-anchor="end" font-size="11" fill="#999">十几只 → 几只</text>

  <polygon points="250,226 240,220 260,220" fill="#999"/>

  <!-- 第4步 -->
  <rect x="120" y="235" width="260" height="48" fill="#E67E22" opacity="0.1" rx="6"/>
  <rect x="120" y="235" width="260" height="48" fill="none" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2" rx="6"/>
  <circle cx="140" cy="259" r="12" fill="#E67E22"/>
  <text x="140" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4</text>
  <text x="165" y="255" font-size="12" font-weight="bold" fill="#E67E22">人工复核</text>
  <text x="165" y="272" font-size="11" fill="#666">行业前景+主观判断</text>
  <text x="330" y="260" text-anchor="end" font-size="11" fill="#999">几只 → 备选池</text>

  <polygon points="250,286 240,280 260,280" fill="#999"/>

  <!-- 第5步 -->
  <rect x="140" y="295" width="220" height="55" fill="#E74C3C" opacity="0.1" rx="8"/>
  <rect x="140" y="295" width="220" height="55" fill="none" stroke="#E74C3C" stroke-width="2" rx="8"/>
  <circle cx="160" cy="322" r="12" fill="#E74C3C"/>
  <text x="160" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">5</text>
  <text x="185" y="315" font-size="12" font-weight="bold" fill="#E74C3C">加入观察池</text>
  <text x="185" y="335" font-size="11" fill="#666">等待状态A信号</text>
  <text x="320" y="325" text-anchor="end" font-size="11" fill="#999">5-8只候选</text>

  <!-- 箭头到底部 -->
  <polygon points="250,353 240,345 260,345" fill="#999"/>
  <polygon points="250,368 240,360 260,360" fill="#999"/>

  <!-- 最终 -->
  <ellipse cx="250" cy="410" rx="100" ry="35" fill="#27AE60" opacity="0.12"/>
  <ellipse cx="250" cy="410" rx="100" ry="35" fill="none" stroke="#27AE60" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="250" y="407" text-anchor="middle" font-size="14" font-weight="bold" fill="#27AE60">第一层概率优势</text>
  <text x="250" y="427" text-anchor="middle" font-size="11" fill="#666">选股成功率已高于随机</text>

  <!-- 底部说明 -->
  <text x="250" y="480" text-anchor="middle" font-size="10" fill="#999">选股只是第一步，好股还要好价格——第3章见</text>
</svg>
