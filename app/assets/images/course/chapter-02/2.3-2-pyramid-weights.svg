<svg xmlns="http://www.w3.org/2000/svg" width="480" height="420" viewBox="0 0 480 420">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="480" height="420" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>

  <text x="240" y="30" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="17" font-weight="700" fill="#2C3E50" text-anchor="middle">金字塔评分权重分配</text>

  <!-- 金字塔5层 -->
  <!-- 顶点 (240, 65), 底边 (55, 390) ~ (425, 390), 总高325 -->

  <!-- 第5层(最底层): y=325~390 -->
  <polygon points="89,325 425,390 55,390" fill="#2ECC71" fill-opacity="0.65" stroke="#27AE60" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="240" y="366" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">现金流量等</text>

  <!-- 第4层: y=260~325 -->
  <polygon points="128,260 387,325 89,325" fill="#27AE60" fill-opacity="0.7" stroke="#1E8449" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="240" y="300" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">现金占比</text>

  <!-- 第3层: y=195~260 -->
  <polygon points="167,195 348,260 128,260" fill="#1ABC9C" fill-opacity="0.7" stroke="#17A589" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="240" y="235" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">毛利率</text>

  <!-- 第2层: y=130~195 -->
  <polygon points="206,130 309,195 167,195" fill="#3498DB" fill-opacity="0.8" stroke="#2980B9" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="240" y="170" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">净利率</text>

  <!-- 第1层(最顶层): y=65~130 -->
  <polygon points="240,65 271,130 206,130" fill="#2C3E50" fill-opacity="0.85" stroke="#1A252F" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="240" y="105" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">ROE</text>
  <text x="240" y="122" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#fff" text-anchor="middle" opacity="0.85">（权重最高）</text>

  <!-- 左侧标注 -->
  <text x="38" y="220" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" font-weight="600" fill="#7F8C8D" text-anchor="middle" transform="rotate(-90, 38, 220)">权重高 →</text>

  <!-- 右侧标注 -->
  <text x="442" y="220" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" font-weight="600" fill="#7F8C8D" text-anchor="middle" transform="rotate(-90, 442, 220)">← 权重低</text>

  <!-- 轮廓边框 -->
  <polygon points="240,65 425,390 55,390" fill="none" stroke="#2C3E50" stroke-width="1" stroke-opacity="0.15" stroke-linejoin="round"/>
</svg>