<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="600" height="380" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>
  <text x="300" y="28" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#333" font-weight="bold">交易日志模板示例</text>

  <!-- table-like layout: starting at (30,50) -->
  <g font-family="PingFang SC, sans-serif" font-size="13" fill="#333">

    <!-- header separator -->
    <line x1="30" y1="45" x2="570" y2="45" stroke="#ddd" stroke-width="1"/>

    <!-- Row 1: 日期 and 股票名称 -->
    <rect x="30" y="50" width="540" height="36" rx="3" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="45" y="73" fill="#666">日期</text>
    <line x1="85" y1="72" x2="250" y2="72" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="275" y="73" fill="#666">股票名称</text>
    <line x1="355" y1="72" x2="520" y2="72" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Row 2: 买入价 and 买入金额 -->
    <rect x="30" y="88" width="540" height="36" rx="3" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="45" y="111" fill="#666">买入价</text>
    <line x1="100" y1="110" x2="250" y2="110" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="275" y="111" fill="#666">买入金额</text>
    <line x1="355" y1="110" x2="520" y2="110" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Row 3: 买入理由 -->
    <rect x="30" y="126" width="540" height="54" rx="3" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="45" y="149" fill="#666">买入理由</text>
    <line x1="125" y1="148" x2="540" y2="148" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="125" y1="165" x2="540" y2="165" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Row 4: 当时情绪 -->
    <rect x="30" y="182" width="540" height="54" rx="3" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="45" y="205" fill="#666">当时情绪</text>
    <!-- checkboxes -->
    <rect x="125" y="194" width="12" height="12" rx="2" fill="white" stroke="#999" stroke-width="1"/>
    <text x="141" y="205" fill="#333">兴奋</text>
    <rect x="195" y="194" width="12" height="12" rx="2" fill="white" stroke="#999" stroke-width="1"/>
    <text x="211" y="205" fill="#333">平静</text>
    <rect x="265" y="194" width="12" height="12" rx="2" fill="white" stroke="#999" stroke-width="1"/>
    <text x="281" y="205" fill="#333">紧张</text>
    <rect x="335" y="194" width="12" height="12" rx="2" fill="white" stroke="#999" stroke-width="1"/>
    <text x="351" y="205" fill="#333">犹豫</text>
    <!-- second line -->
    <line x1="125" y1="223" x2="520" y2="223" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Row 5: 止损位 and 出场策略 -->
    <rect x="30" y="238" width="540" height="36" rx="3" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <text x="45" y="261" fill="#666">止损位</text>
    <line x1="105" y1="260" x2="250" y2="260" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="275" y="261" fill="#666">出场策略</text>
    <line x1="355" y1="260" x2="520" y2="260" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- bottom note -->
    <text x="300" y="310" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#999">坚持记录每一笔交易，复盘时才能发现自己的心理模式</text>

  </g>
</svg>
