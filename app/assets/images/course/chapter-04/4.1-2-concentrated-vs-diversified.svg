<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="600" height="380" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>
  <text x="300" y="30" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#333" font-weight="bold">集中持仓 vs 分散持仓——资金曲线对比</text>

  <!-- chart area: 520x240 at (40,50) -->
  <rect x="40" y="50" width="520" height="240" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- dashed grid lines -->
  <line x1="40" y1="90" x2="560" y2="90" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="40" y1="130" x2="560" y2="130" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="40" y1="170" x2="560" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="40" y1="210" x2="560" y2="210" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="40" y1="250" x2="560" y2="250" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- concentrated (red) - big swings, jagged -->
  <polyline points="50,240 90,230 130,200 160,210 200,150 240,120 280,100 300,130 320,160 360,90 380,70 400,80 420,110 440,200 460,250 480,270 500,260 520,230 540,240 560,250"
    fill="none" stroke="#E74C3C" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- diversified (green) - smooth upward -->
  <polyline points="50,240 90,238 130,235 170,232 210,228 250,223 290,218 330,212 370,205 410,198 450,190 490,182 530,174 560,168"
    fill="none" stroke="#27AE60" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- legend -->
  <rect x="50" y="305" width="12" height="12" rx="1" fill="#E74C3C"/>
  <text x="66" y="316" font-family="PingFang SC, sans-serif" font-size="12" fill="#333">集中持仓（大幅波动）</text>
  <rect x="220" y="305" width="12" height="12" rx="1" fill="#27AE60"/>
  <text x="236" y="316" font-family="PingFang SC, sans-serif" font-size="12" fill="#333">分散持仓（平滑向上）</text>

  <!-- axis labels -->
  <text x="20" y="150" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#999" transform="rotate(-90,20,150)">资金</text>
  <text x="300" y="340" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#999">时间</text>
</svg>
