<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="600" height="360" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>

  <text x="300" y="28" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#2C3E50" text-anchor="middle">MACD其实就三部分</text>

  <!-- 上半部分：模拟MACD图 -->
  <!-- 0轴 -->
  <line x1="80" y1="180" x2="560" y2="180" stroke="#333" stroke-width="2"/>

  <!-- 0轴标注 -->
  <text x="70" y="184" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#333" text-anchor="end">0轴</text>

  <!-- 两条线（DIF和DEA） -->
  <path d="M 80 200 L 120 195 L 160 185 L 200 170 L 240 155 L 280 140 L 320 110 L 360 80 L 400 60 L 440 55 L 480 60 L 520 70"
        fill="none" stroke="#3498DB" stroke-width="2.5"/>
  <path d="M 80 205 L 120 200 L 160 192 L 200 180 L 240 168 L 280 155 L 320 130 L 360 105 L 400 85 L 440 80 L 480 82 L 520 88"
        fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- 柱子（颜色修正：上红下绿） -->
  <rect x="95" y="195" width="8" height="15" fill="#27AE60" opacity="0.7"/>
  <rect x="115" y="192" width="8" height="12" fill="#27AE60" opacity="0.7"/>
  <rect x="135" y="188" width="8" height="8" fill="#27AE60" opacity="0.7"/>
  <rect x="155" y="182" width="8" height="2" fill="#27AE60" opacity="0.7"/>
  <rect x="175" y="178" width="8" height="4" fill="#E74C3C" opacity="0.7"/>
  <rect x="195" y="172" width="8" height="10" fill="#E74C3C" opacity="0.7"/>
  <rect x="215" y="165" width="8" height="18" fill="#E74C3C" opacity="0.7"/>
  <rect x="235" y="158" width="8" height="25" fill="#E74C3C" opacity="0.7"/>
  <rect x="255" y="150" width="8" height="33" fill="#E74C3C" opacity="0.7"/>
  <rect x="275" y="145" width="8" height="38" fill="#E74C3C" opacity="0.7"/>
  <rect x="295" y="135" width="8" height="48" fill="#E74C3C" opacity="0.7"/>
  <rect x="315" y="120" width="8" height="60" fill="#E74C3C" opacity="0.7"/>
  <rect x="335" y="105" width="8" height="75" fill="#E74C3C" opacity="0.7"/>
  <rect x="355" y="95" width="8" height="85" fill="#E74C3C" opacity="0.7"/>
  <rect x="375" y="90" width="8" height="90" fill="#E74C3C" opacity="0.7"/>
  <rect x="395" y="88" width="8" height="92" fill="#E74C3C" opacity="0.7"/>
  <rect x="415" y="90" width="8" height="90" fill="#E74C3C" opacity="0.7"/>
  <rect x="435" y="95" width="8" height="85" fill="#E74C3C" opacity="0.7"/>
  <rect x="455" y="105" width="8" height="75" fill="#E74C3C" opacity="0.7"/>
  <rect x="475" y="115" width="8" height="65" fill="#E74C3C" opacity="0.7"/>
  <rect x="495" y="125" width="8" height="55" fill="#E74C3C" opacity="0.7"/>
  <rect x="515" y="135" width="8" height="45" fill="#E74C3C" opacity="0.7"/>

  <!-- 标注框 -->
  <!-- 1. 0轴 -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="100" height="28" rx="5" fill="#E74C3C" opacity="0.08"/>
    <rect x="0" y="0" width="100" height="28" rx="5" fill="none" stroke="#E74C3C" stroke-width="1"/>
    <text x="50" y="19" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#E74C3C" text-anchor="middle">① 0轴 — 分水岭</text>
    <line x1="50" y1="0" x2="50" y2="-38" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- 2. 两条线 -->
  <g transform="translate(220, 85)">
    <rect x="0" y="0" width="135" height="28" rx="5" fill="#3498DB" opacity="0.08"/>
    <rect x="0" y="0" width="135" height="28" rx="5" fill="none" stroke="#3498DB" stroke-width="1"/>
    <text x="67" y="19" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#3498DB" text-anchor="middle">② 两条线 — DIF和DEA</text>
    <line x1="67" y1="28" x2="100" y2="50" stroke="#3498DB" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- 3. 柱子 -->
  <g transform="translate(370, 210)">
    <rect x="0" y="0" width="100" height="28" rx="5" fill="#E74C3C" opacity="0.08"/>
    <rect x="0" y="0" width="100" height="28" rx="5" fill="none" stroke="#E74C3C" stroke-width="1"/>
    <text x="50" y="19" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#E74C3C" text-anchor="middle">③ 柱子 — 红绿柱</text>
    <line x1="50" y1="0" x2="50" y2="-50" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <text x="300" y="340" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#999" text-anchor="middle">HOLDLE只看这三样，其他MACD参数全部忽略</text>
</svg>