<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350" viewBox="0 0 600 350">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="600" height="350" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>

  <text x="300" y="28" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#2C3E50" text-anchor="middle">买在最低点 vs 买在合理区间</text>

  <!-- 坐标轴 -->
  <line x1="80" y1="280" x2="560" y2="280" stroke="#666" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="80" y2="60" stroke="#666" stroke-width="1.5"/>
  <text x="320" y="305" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle">时间 →</text>
  <text x="25" y="180" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle" transform="rotate(-90,25,180)">股价</text>

  <!-- 上涨曲线 -->
  <path d="M 80 260 L 120 240 L 160 220 L 200 210 L 240 180 L 280 170 L 320 150 L 360 100 L 400 80 L 440 70 L 500 60 L 540 55"
        fill="none" stroke="#3498DB" stroke-width="2.5"/>

  <!-- 最低点标记 -->
  <circle cx="160" cy="220" r="5" fill="#E74C3C"/>
  <text x="160" y="210" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#E74C3C" text-anchor="middle">最低点</text>
  <text x="160" y="195" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="10" fill="#E74C3C" text-anchor="middle">（抄底，理想化）</text>

  <!-- 合理区间标记（320-400之间） -->
  <rect x="310" y="85" width="100" height="80" fill="#27AE60" opacity="0.1" rx="6"/>
  <rect x="310" y="85" width="100" height="80" fill="none" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,2" rx="6"/>
  <text x="360" y="130" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#27AE60" text-anchor="middle">合理区间</text>
  <text x="360" y="150" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="10" fill="#27AE60" text-anchor="middle">（状态A进场）</text>

  <!-- 收益标注 -->
  <line x1="160" y1="220" x2="160" y2="55" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="360" y1="100" x2="360" y2="55" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="160" y="45" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle">+165%</text>
  <text x="360" y="45" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#27AE60" text-anchor="middle">+130%</text>

  <!-- 底部说明 -->
  <text x="300" y="340" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#999" text-anchor="middle">买在最低点多赚35%，但为了那35%可能错过整个机会</text>
</svg>