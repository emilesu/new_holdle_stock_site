<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350" viewBox="0 0 600 350">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="600" height="350" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>

  <text x="300" y="28" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#2C3E50" text-anchor="middle">一根K线告诉你四件事</text>

  <!-- 阳线（红色） -->
  <g transform="translate(150, 175)">
    <!-- 最高最低连线 -->
    <line x1="30" y1="-90" x2="30" y2="90" stroke="#E74C3C" stroke-width="1.5"/>
    <!-- 实体 -->
    <rect x="5" y="-50" width="50" height="110" fill="#E74C3C" rx="3"/>
    <text x="30" y="-105" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle">最高价</text>
    <!-- <text x="30" y="-115" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">（最高点）</text> -->
    <text x="30" y="105" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle">最低价</text>
    <!-- <text x="30" y="115" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="10" fill="#999" text-anchor="middle">（最低点）</text> -->
    <text x="105" y="-40" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#E74C3C" text-anchor="start">收盘价</text>
    <text x="105" y="55" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#E74C3C" text-anchor="start">开盘价</text>
    <text x="80" y="10" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#E74C3C" text-anchor="start">阳线（涨了）</text>
  </g>

  <!-- 阴线（绿色） -->
  <g transform="translate(400, 175)">
    <line x1="30" y1="-90" x2="30" y2="90" stroke="#27AE60" stroke-width="1.5"/>
    <rect x="5" y="-60" width="50" height="120" fill="#27AE60" rx="3"/>
    <text x="30" y="-105" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle">最高价</text>
    <text x="30" y="105" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#666" text-anchor="middle">最低价</text>
    <text x="105" y="-50" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#27AE60" text-anchor="start">开盘价</text>
    <text x="105" y="55" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#27AE60" text-anchor="start">收盘价</text>
    <text x="80" y="10" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="13" font-weight="700" fill="#27AE60" text-anchor="start">阴线（跌了）</text>
  </g>

  <text x="300" y="340" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="11" fill="#999" text-anchor="middle">上影线、下影线、十字星这些——HOLDLE不需要</text>
</svg>
