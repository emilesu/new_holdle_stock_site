<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="620" height="400" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>
  <text x="310" y="30" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="15" fill="#333" font-weight="bold">英伟达（NVDA）2022-2023年核心财务数据</text>
  <text x="310" y="50" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">（美股科技行业 · 与同行业对比）</text>

  <!-- 指标卡片 -->
  <!-- ROE -->
  <rect x="30" y="70" width="260" height="100" rx="8" fill="#E8F8F5" stroke="#A3E4D7" stroke-width="1"/>
  <text x="50" y="95" font-family="PingFang SC,sans-serif" font-size="12" fill="#666">净资产收益率（ROE）</text>
  <text x="50" y="130" font-family="PingFang SC,sans-serif" font-size="28" fill="#27AE60" font-weight="bold">35%</text>
  <text x="50" y="155" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">行业均值：~15%</text>
  <line x1="160" y1="120" x2="260" y2="120" stroke="#A3E4D7" stroke-width="0.5"/>
  <text x="250" y="130" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="11" fill="#27AE60" font-weight="bold">远超行业</text>
  <text x="250" y="148" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="10" fill="#27AE60">2.3倍</text>

  <!-- 毛利率 -->
  <rect x="310" y="70" width="260" height="100" rx="8" fill="#E8F8F5" stroke="#A3E4D7" stroke-width="1"/>
  <text x="330" y="95" font-family="PingFang SC,sans-serif" font-size="12" fill="#666">毛利率</text>
  <text x="330" y="130" font-family="PingFang SC,sans-serif" font-size="28" fill="#27AE60" font-weight="bold">62%</text>
  <text x="330" y="155" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">行业均值：~40%</text>
  <line x1="440" y1="120" x2="540" y2="120" stroke="#A3E4D7" stroke-width="0.5"/>
  <text x="530" y="130" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="11" fill="#27AE60" font-weight="bold">行业领先</text>
  <text x="530" y="148" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="10" fill="#27AE60">1.5倍</text>

  <!-- 经营现金流 -->
  <rect x="30" y="185" width="260" height="100" rx="8" fill="#E8F8F5" stroke="#A3E4D7" stroke-width="1"/>
  <text x="50" y="210" font-family="PingFang SC,sans-serif" font-size="12" fill="#666">经营现金流</text>
  <text x="50" y="245" font-family="PingFang SC,sans-serif" font-size="22" fill="#27AE60" font-weight="bold">非常充裕</text>
  <text x="50" y="268" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">自由现金流持续为正</text>
  <line x1="160" y1="235" x2="260" y2="235" stroke="#A3E4D7" stroke-width="0.5"/>
  <text x="250" y="245" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="11" fill="#27AE60" font-weight="bold">财务健康</text>

  <!-- 净利率 -->
  <rect x="310" y="185" width="260" height="100" rx="8" fill="#E8F8F5" stroke="#A3E4D7" stroke-width="1"/>
  <text x="330" y="210" font-family="PingFang SC,sans-serif" font-size="12" fill="#666">净利率</text>
  <text x="330" y="245" font-family="PingFang SC,sans-serif" font-size="28" fill="#27AE60" font-weight="bold">28%</text>
  <text x="330" y="268" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">行业均值：~10%</text>
  <line x1="440" y1="235" x2="540" y2="235" stroke="#A3E4D7" stroke-width="0.5"/>
  <text x="530" y="245" text-anchor="end" font-family="PingFang SC,sans-serif" font-size="11" fill="#27AE60" font-weight="bold">盈利能力突出</text>

  <!-- AI赛道标签 -->
  <rect x="30" y="300" width="540" height="40" rx="6" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1"/>
  <text x="300" y="325" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#2E86C1" font-weight="bold">⚡ AI芯片赛道领先地位 · 2023年AI爆发核心受益标的</text>

  <!-- 底部说明 -->
  <rect x="30" y="350" width="540" height="36" rx="4" fill="#FEF9E7" stroke="#F9E79F" stroke-width="0.5"/>
  <text x="50" y="373" font-family="PingFang SC,sans-serif" font-size="11" fill="#856404">选股结论：财务数据全维度领先 + 行业前景明确 → 通过金字塔筛选和人工复核</text>
</svg>
