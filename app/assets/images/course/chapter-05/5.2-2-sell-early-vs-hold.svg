<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="620" height="400" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>
  <text x="310" y="28" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="15" fill="#333" font-weight="bold">卖飞十倍股 vs 周K低点持有 — 对比</text>

  <!-- 左侧：卖飞 -->
  <rect x="20" y="45" width="280" height="310" rx="6" fill="#FFF" stroke="#E74C3C" stroke-width="1.5"/>
  <rect x="20" y="45" width="280" height="36" rx="6" fill="#E74C3C" opacity="0.9"/>
  <text x="160" y="68" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#FFF" font-weight="bold">✗ 卖飞了（2010年）</text>

  <text x="35" y="100" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">操作：涨了30%就卖了</text>
  <text x="35" y="118" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">结果：卖出后该股涨了十倍</text>

  <!-- K线示意（卖飞） -->
  <rect x="40" y="135" width="240" height="130" fill="#F5F5F5" rx="4" stroke="#EEE" stroke-width="0.5"/>
  <text x="160" y="155" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="9" fill="#999">股价走势</text>

  <!-- 上涨前段 -->
  <path d="M 50,240 L 70,220 L 90,225 L 110,210 L 130,215 L 150,190" fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 卖飞点 -->
  <circle cx="150" cy="190" r="5" fill="#E74C3C"/>
  <text x="150" y="182" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="9" fill="#E74C3C" font-weight="bold">卖</text>
  <!-- 继续上涨（虚影） -->
  <path d="M 150,190 L 170,165 L 190,140 L 210,120 L 230,100 L 250,85" fill="none" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.4"/>
  <text x="220" y="115" font-family="PingFang SC,sans-serif" font-size="9" fill="#E74C3C" opacity="0.5">涨了十倍</text>

  <text x="35" y="285" font-family="PingFang SC,sans-serif" font-size="11" fill="#C0392B" font-weight="bold">吃到的涨幅：30%</text>
  <text x="35" y="305" font-family="PingFang SC,sans-serif" font-size="11" fill="#C0392B">错过的涨幅：≈900%</text>
  <text x="35" y="325" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">卖出理由："觉得涨够了"</text>
  <text x="35" y="343" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">违反规则：没有周K低点出场规则</text>

  <!-- 右侧：周K持有 -->
  <rect x="320" y="45" width="280" height="310" rx="6" fill="#FFF" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="320" y="45" width="280" height="36" rx="6" fill="#27AE60" opacity="0.9"/>
  <text x="460" y="68" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#FFF" font-weight="bold">✓ 周K低点持有</text>

  <text x="335" y="100" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">操作：按周K低点规则持有</text>
  <text x="335" y="118" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">结果：完整吃下整波上涨趋势</text>

  <!-- K线示意（持有） -->
  <rect x="340" y="135" width="240" height="130" fill="#F5F5F5" rx="4" stroke="#EEE" stroke-width="0.5"/>
  <text x="460" y="155" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="9" fill="#999">股价走势</text>

  <path d="M 350,240 L 370,220 L 390,225 L 410,210 L 430,215 L 450,190 L 470,170 L 490,145 L 510,125 L 530,105 L 545,95" fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 出场点 -->
  <circle cx="530" cy="105" r="5" fill="#27AE60"/>
  <text x="530" y="97" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="9" fill="#27AE60" font-weight="bold">破</text>
  <text x="530" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="9" fill="#27AE60">周K低点跌破</text>

  <!-- 低点标注 -->
  <circle cx="390" cy="225" r="3" fill="#3498DB"/>
  <circle cx="450" cy="190" r="3" fill="#3498DB"/>
  <circle cx="490" cy="145" r="3" fill="#3498DB"/>

  <text x="335" y="285" font-family="PingFang SC,sans-serif" font-size="11" fill="#1E8449" font-weight="bold">可能吃到的涨幅：😮‍💨 说了都是泪</text>
  <text x="335" y="305" font-family="PingFang SC,sans-serif" font-size="11" fill="#1E8449">完整吃下整波趋势</text>
  <text x="335" y="325" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">卖出理由：周K低点被跌破</text>
  <text x="335" y="343" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">核心规则：不赌顶，只跟随</text>
</svg>
