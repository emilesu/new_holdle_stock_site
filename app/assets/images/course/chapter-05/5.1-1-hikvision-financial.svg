<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="620" height="400" rx="8" fill="#FAFAFA" filter="url(#shadow)"/>
  <text x="310" y="30" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="15" fill="#333" font-weight="bold">海康威视2011-2015年核心财务指标对比</text>
  <text x="310" y="50" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="11" fill="#999">（手动翻新浪财经/Yahoo财务 · 与同行业均值对比）</text>

  <!-- 表头 -->
  <rect x="30" y="65" width="140" height="36" rx="4" fill="#2C3E50"/>
  <text x="100" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">财务指标</text>

  <rect x="170" y="65" width="85" height="36" rx="4" fill="#2C3E50"/>
  <text x="212" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">2011年</text>

  <rect x="255" y="65" width="85" height="36" rx="4" fill="#2C3E50"/>
  <text x="298" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">2012年</text>

  <rect x="340" y="65" width="85" height="36" rx="4" fill="#2C3E50"/>
  <text x="382" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">2013年</text>

  <rect x="425" y="65" width="85" height="36" rx="4" fill="#2C3E50"/>
  <text x="468" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">2014年</text>

  <rect x="510" y="65" width="85" height="36" rx="4" fill="#2C3E50"/>
  <text x="552" y="88" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#FFF" font-weight="bold">2015年</text>

  <!-- 第1行：ROE -->
  <rect x="30" y="105" width="140" height="40" fill="#FFF" stroke="#EEE" stroke-width="0.5"/>
  <text x="100" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#333" font-weight="bold">ROE（净资产收益率）</text>

  <rect x="170" y="105" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="212" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">24%</text>

  <rect x="255" y="105" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="298" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">27%</text>

  <rect x="340" y="105" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="382" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">31%</text>

  <rect x="425" y="105" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="468" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">36%</text>

  <rect x="510" y="105" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="552" y="130" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">35%</text>

  <!-- 第2行：毛利率 -->
  <rect x="30" y="147" width="140" height="40" fill="#F5F5F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="100" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#333" font-weight="bold">毛利率</text>

  <rect x="170" y="147" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="212" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">49%</text>

  <rect x="255" y="147" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="298" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">49%</text>

  <rect x="340" y="147" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="382" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">47%</text>

  <rect x="425" y="147" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="468" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">44%</text>

  <rect x="510" y="147" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="552" y="172" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">40%</text>

  <!-- 第3行：净利率 -->
  <rect x="30" y="189" width="140" height="40" fill="#FFF" stroke="#EEE" stroke-width="0.5"/>
  <text x="100" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#333" font-weight="bold">净利率</text>

  <rect x="170" y="189" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="212" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">28%</text>

  <rect x="255" y="189" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="298" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">29%</text>

  <rect x="340" y="189" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="382" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">28%</text>

  <rect x="425" y="189" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="468" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">27%</text>

  <rect x="510" y="189" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="552" y="214" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">23%</text>

  <!-- 第4行：现金/总资产 -->
  <rect x="30" y="231" width="140" height="40" fill="#F5F5F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="100" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#333" font-weight="bold">现金/总资产比</text>

  <rect x="170" y="231" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="212" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">35%</text>

  <rect x="255" y="231" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="298" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">34%</text>

  <rect x="340" y="231" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="382" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">38%</text>

  <rect x="425" y="231" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="468" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">36%</text>

  <rect x="510" y="231" width="85" height="40" fill="#E8F8F5" stroke="#EEE" stroke-width="0.5"/>
  <text x="552" y="256" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#27AE60" font-weight="bold">35%</text>

  <!-- 底部说明 -->
  <rect x="30" y="285" width="565" height="90" rx="4" fill="#FEF9E7" stroke="#F9E79F" stroke-width="0.5"/>
  <text x="50" y="305" font-family="PingFang SC,sans-serif" font-size="11" fill="#856404" font-weight="bold">对比结论（vs 行业均值ROE~10%、毛利率~20%、净利率~8%）：</text>
  <text x="50" y="323" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">● ROE从24%逐年提升至35%——持续增长，远超行业均值10%</text>
  <text x="50" y="341" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">● 毛利率40%以上、净利率23%以上——盈利能力突出</text>
  <text x="50" y="359" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">● 现金占比34%以上——财务健康、现金流充裕</text>
</svg>